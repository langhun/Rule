# ==============================================================================
# 8. 规则引擎 (Rules) - 自上而下匹配，命中即停！
# ==============================================================================
rules:
  # ---------------- 基础防护墙 (最高优先级) ----------------
  - RULE-SET,private_ip,🎯 全球直连,no-resolve           # 局域网 IP 直连 (不解析 DNS，防止死循环)
  - RULE-SET,private_domain,🎯 全球直连                  # 本地私有域名直连 (如 .local)
  - RULE-SET,adblock_domain,🛑 广告拦截                  # 命中第三方去广告规则库的流量，直接拦截
  - RULE-SET,direct_list,🎯 全球直连                     # 用户自定义的直连白名单

  # ---------------- AI 与 高优先级业务 ----------------
  - RULE-SET,openai_domain,🤖 OpenAI                     # ChatGPT 系列走专属新/日节点
  - RULE-SET,anthropic_domain,🤖 Claude                  # Claude 走专属日/新节点
  - RULE-SET,google_ai,🤖 Gemini                         # Gemini 走美国节点
  - RULE-SET,crypto_domain,💰 加密货币                   # 虚拟币交易所等涉及资金安全，单独路由

  # ---------------- 流媒体及特定大厂 (YouTube 已提权) ----------------
  - RULE-SET,youtube_domain,📹 YouTube                   # 【优化】YouTube 提至 Google 上方，确保视频流被精准识别
  - RULE-SET,google_domain,🇬 Google                      # 剩余的 Google 服务 (搜索、Gmail) 走通用 Google 组
  - RULE-SET,google_ip,🇬 Google,no-resolve               # Google 服务器真实 IP 段匹配
  - RULE-SET,github_domain,🚀 节点选择                   # GitHub 代码拉取，建议走主路由
  - RULE-SET,tiktok_domain,🎵 TikTok                     # 抖音国际版短视频
  - RULE-SET,telegram_domain,✈️ Telegram                 # TG 域名通讯
  - RULE-SET,telegram_ip,✈️ Telegram,no-resolve         # TG 真实 IP 段直连匹配，加速消息接收
  - RULE-SET,netflix_domain,🎥 Netflix                   # 奈飞流媒体
  - RULE-SET,netflix_ip,🎥 Netflix,no-resolve            # 奈飞真实视频缓冲 IP 池
  - RULE-SET,disney_domain,🏰 Disney+                    # 迪士尼流媒体
  - RULE-SET,spotify_domain,🎧 Spotify                   # 音乐流媒体平台
  - RULE-SET,steam_cn_domain,🎯 全球直连                 # Steam 国内商店直连（不影响下载速度）
  - RULE-SET,epic_domain,🎮 游戏加速                     # Epic 游戏商店
  - RULE-SET,pt_domain,📦 PT下载                         # 命中 PT 种子站规则，强制走直连（保护机场不被封）
  - RULE-SET,speedtest_domain,📈 网络测速                # 测速服务引流

  # ---------------- 常规跨国互联网企业服务 ----------------
  - RULE-SET,apple_domain,🍎 Apple                       # 苹果全家桶（iCloud、AppStore）
  - RULE-SET,appletv_domain,🍎 Apple                     # 苹果流媒体 TV+
  - RULE-SET,apple_ip,🍎 Apple,no-resolve                # 苹果服务器 IP 库匹配
  - RULE-SET,bing_domain,🔍 Bing                         # 必应搜索
  - RULE-SET,onedrive_domain,☁️ OneDrive                # 微软云盘同步
  - RULE-SET,microsoft_domain,Ⓜ️ 微软服务               # 微软综合办公套件

  # ---------------- 大地毯式分流与兜底 (最低优先级) ----------------
  - RULE-SET,geolocation-!cn,🚀 节点选择                 # 非中国大陆的所有全球流量，无脑走代理节点
  - RULE-SET,cn_domain,🎯 全球直连                       # 中国大陆的所有备案域名，直接放行
  - RULE-SET,cn_ip,🎯 全球直连,no-resolve                # 中国大陆的所有分配 IP 库，直接放行
  - MATCH,🐟 兜底节点                                    # 【终极兜底】如果上面几万条规则全都没命中，走此选项防止断网

