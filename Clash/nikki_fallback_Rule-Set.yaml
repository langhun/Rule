# 名称： Nikki_fallback_Rule-Set (最终精调版)
# 版本： V2026.3.02_Final
# 日期： 2026年3月
# 内核： Mihomo / Clash / OpenClash
# 说明： 完整修复并验证，已解决策略组空载问题，优化了 YouTube 分流权重。

# ==============================================================================
# 1. 代理集合 (Proxy Providers) - 您的节点仓库
# ==============================================================================
proxy-providers:
  机场名:                                           # 【重要】机场的自定义代号（下方策略组通过此名称调用节点）
    type: http                                      # 获取方式：通过 HTTP(S) 链接在线拉取
    interval: 86400                                 # 自动更新间隔：86400 秒 = 24 小时
    proxy: DIRECT                                   # 更新订阅时使用直连（防止代理套娃导致更新失败）
    health-check:                                   # 节点健康度检查设置
      enable: true                                  # 开启节点连通性测试
      url: 'https://cp.cloudflare.com/generate_204' # 测试目标地址（返回 204 无内容即为可用）
      interval: 300                                 # 测试间隔：300 秒 = 5 分钟
    filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置)).*$" # 正则过滤：屏蔽掉机场发来的毫无用处的广告/提示节点
    url: '机场订阅'                                   # 【重要】请将此处替换为您真实的机场订阅链接（保留单引号）
    override:                                       # 节点属性覆盖
      additional-prefix: '[Xx] '                    # 为拉取到的节点名称前强制添加前缀标识

# ==============================================================================
# 2. 核心系统配置 (Core Settings)
# ==============================================================================
geodata-mode: true                                  # 开启 GeoData 模式（提升按国家/地区分流的精度）
geodata-loader: memconservative                     # 数据库加载模式：内存保守模式（大幅降低软路由/手机内存占用）
tcp-fast-open: true                                 # 开启 TCP 快速打开（减少握手延迟，提升网页加载速度）
mixed-port: 7893                                    # 本地混合代理端口：同时支持 HTTP 和 SOCKS5
mode: rule                                          # 运行模式：rule = 按规则智能分流
allow-lan: true                                     # 允许局域网连接：让同一路由器下的其他设备也能通过您代理
bind-address: "*"                                   # 监听接口：* 表示监听本机的所有网卡接口
tcp-concurrent: true                                # 开启 TCP 并发：多路复用提升多线程下载与并发请求性能
unified-delay: true                                 # 开启统一延迟算法：消除因握手协议不同导致的延迟抖动
log-level: info                                     # 控制台日志级别：info（日常使用推荐，排错时可改 debug）
ipv6: true                                          # 开启 IPv6 支持：允许解析和代理 IPv6 流量
profile:
  store-selected: true                              # 记忆功能：重启软件后自动恢复您上次手动选好的节点
  store-fake-ip: true                               # 缓存功能：保存 Fake-IP 映射表，加速 DNS 再次解析

# ==============================================================================
# 3. 本地管理面板 (Web UI)
# ==============================================================================
external-ui-name: zashboard                         # UI 面板名称：Zashboard（界面美观现代）
external-ui: ui                                     # UI 本地存放目录
external-controller: "0.0.0.0:9090"                 # 面板控制端口：浏览器输入 127.0.0.1:9090 即可访问面板
secret: ""                                          # 面板访问密码：留空表示无需密码登录
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip" # 面板云端下载地址

# ==============================================================================
# 4. TUN 虚拟网卡配置 (网卡级接管)
# ==============================================================================
tun:
  enable: true                                      # 开启 TUN 模式：接管系统所有流量（包括不遵循系统代理的 APP）
  stack: system                                     # 网络栈模式：使用系统原生网络栈（性能最好）
  dns-hijack: ['0.0.0.0:53']                        # DNS 劫持：强行接管本机发往 53 端口的所有 DNS 解析请求
  auto-detect-interface: true                       # 自动识别出口网卡（Meta 内核专属优化）
  auto-route: true                                  # 自动设置系统路由表：将系统流量导向 TUN 网卡
  auto-redirect: true                               # 自动重定向本地流量（Meta 内核专属优化）
  strict-route: false                               # 严格路由模式：关闭（避免与其他 VPN 或虚拟机网络冲突）
  endpoint-independent-nat: true                    # 开启全锥型 NAT 兼容：大幅优化 P2P 下载和外服联机游戏体验

# ==============================================================================
# 5. 流量嗅探配置 (Sniffer) - 解决 DNS 污染与流媒体解锁
# ==============================================================================
sniffer:
  enable: true                                      # 开启流量嗅探
  override-destination: true                        # 覆盖目标：将通过嗅探拿到的真实域名替换掉伪造的 IP
  parse-pure-ip: false                              # 纯 IP 解析：关闭（防止对本就是 IP 的请求强行反查导致卡顿）
  force-dns-mapping: false                          # 强制 DNS 映射：关闭
  sniff:                                            # 嗅探协议配置
    QUIC:
      ports: [443]                                  # 嗅探 HTTP/3 (QUIC) 协议，通常在 443 端口
    TLS:
      ports: [443, 8443]                            # 嗅探 HTTPS (TLS) 协议的 SNI 域名信息
    HTTP:
      ports: [80, 8080-8880]                        # 嗅探明文 HTTP 协议的主机头信息
      override-destination: true                    # 允许 HTTP 结果覆盖目标
  force-domain:                                     # 必须强制嗅探的域名列表（专治 CDN 分发和流媒体限制）
    - "+.netflix.com"                               # 强制嗅探 Netflix 主域名
    - "+.nflxvideo.net"                             # 强制嗅探 Netflix 视频服务器
    - "+.media.dssott.com"                          # 强制嗅探 Disney+ 视频服务器
    - "+.openai.com"                                # 强制嗅探 ChatGPT
    - "+.anthropic.com"                             # 强制嗅探 Claude
    - "+.googleapis.com"                            # 强制嗅探 Google API
  skip-domain:                                      # 严禁嗅探的域名列表（防止误杀系统级通讯）
    - "+.apple.com"                                 # 跳过苹果所有服务
    - Mijia Cloud                                   # 跳过米家智能家居云服务
    - dlg.io.mi.com                                 # 跳过小米局域网通讯
    - "+.oray.com"                                  # 跳过花生壳内网穿透
    - "+.sunlogin.net"                              # 跳过向日葵远程桌面控制
    - "+.push.apple.com"                            # 跳过苹果消息推送服务，防止微信收不到消息

# ==============================================================================
# 6. DNS 防污染配置 (Fake-IP 体系)
# ==============================================================================
dns:
  enable: true                                      # 开启内置 DNS 服务器
  listen: "0.0.0.0:7874"                            # 本地 DNS 监听端口
  ipv6: true                                        # 允许响应 IPv6 的 DNS 请求
  enhanced-mode: fake-ip                            # 增强模式：返回 Fake-IP（极速响应，秒开网页的核心）
  fake-ip-range: 198.18.0.1/16                      # Fake-IP 虚拟地址池范围（RFC 6598 预留段，无冲突）
  fake-ip-filter-mode: blacklist                    # 过滤器模式：黑名单（命中下方列表的域名返回真实 IP）
  respect-rules: true                               # 尊重分流规则：DNS 请求严格遵循下方 rules 的分发逻辑
  fake-ip-filter:                                   # 绝对不能返回 Fake-IP 的域名（防止局域网和特殊网站崩溃）
    - '*.lan'                                       # 局域网后缀返回真实 IP
    - "rule-set:cn_domain"                          # 大陆国内域名返回真实 IP（避免国内 CDN 减速）
  
  default-nameserver:                               # 默认 DNS：用于解析下方的加密 DNS 域名本身
    - 114.114.114.114                               # 国内 114 公共 DNS
    - tls://223.5.5.5:853                           # 阿里云加密 DNS
  
  proxy-server-nameserver:                          # 代理服务器专属 DNS：专用于解析“机场订阅链接”和“节点域名”
    - https://dns.alidns.com/dns-query              # 阿里 DoH
    - https://doh.pub/dns-query                     # 腾讯 DoH
  
  direct-nameserver:                                # 直连专属 DNS：专用于解析国内域名
    - 223.5.5.5                                     # 阿里公共 DNS
    - 114.114.114.114                               # 114 公共 DNS

  nameserver:                                       # 全局权威 DNS：负责解析最终的所有外部请求
    - https://doh.pub/dns-query                     # 腾讯加密 DoH
    - https://dns.alidns.com/dns-query              # 阿里加密 DoH

